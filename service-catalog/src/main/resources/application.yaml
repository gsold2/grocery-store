spring:
    application:
        name: service-catalog
    datasource:
        url: jdbc:postgresql://localhost:5432/service
        username: user
        password: password
    jpa:
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect

server:
    port: 8081
logging:
    level:
        sql: info

springdoc:
    swagger-ui:
        path: /swagger-ui.html
    api-docs:
        path: /api-docs
